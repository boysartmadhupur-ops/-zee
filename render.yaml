services:
  - type: web
    name: boys-art-server
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: ADMIN_SECRET
        value: boysart2024master
      - key: DATA_DIR
        value: /opt/render/project/src/data
